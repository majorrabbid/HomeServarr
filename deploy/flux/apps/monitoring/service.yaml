# Beszel hub UI. ClusterIP only — LAN access via the Traefik Ingress (beszel.home).
# Agents don't need to reach the hub: in the SSH model the hub dials out to each
# agent on :45876, so no inbound service is required for metrics collection.
apiVersion: v1
kind: Service
metadata:
  name: beszel
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: beszel
  ports:
    - port: 8090
      targetPort: 8090
      name: http
