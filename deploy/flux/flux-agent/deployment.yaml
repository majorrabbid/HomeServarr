apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeservarr-jarvis-agent
  namespace: homeservarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homeservarr-jarvis-agent
  template:
    metadata:
      labels:
        app: homeservarr-jarvis-agent
    spec:
      containers:
        - name: jarvis-agent
          image: ghcr.io/<your-org>/homeservarr-jarvis-agent:latest
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/homeservarr-agent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
