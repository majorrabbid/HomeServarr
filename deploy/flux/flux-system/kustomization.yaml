apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homeservarr-agent
  namespace: flux-system
spec:
  interval: 5m0s
  sourceRef:
    kind: GitRepository
    name: homeservarr-repo
  path: "./deploy/flux/flux-agent"
  prune: true

  retryInterval: 2m0s
  targetNamespace: homeservarr
