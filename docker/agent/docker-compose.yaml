services:
  jarvis-agent:
    build: .
    image: homeservarr-jarvis-agent:local
    container_name: homeservarr-jarvis-agent
    restart: unless-stopped
    working_dir: /opt/homeservarr
    command: tail -f /dev/null
    volumes:
      - ../..:/opt/homeservarr:rw
    tty: true
    stdin_open: true
